<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PDKS Admin</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#F2F0EB',
                        dark: '#26262A',
                        primary: '#F5B301',
                        success: '#2E9E5B',
                        danger: '#D9483B',
                        surface: '#FFFFFF'
                    }
                }
            }
        }
    </script>
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar placeholder -->
        <div id="sidebar-container"></div>

        <main class="main-content">
            <!-- Topbar placeholder -->
            <header class="topbar" id="topbar-container"></header>

            <!-- Main Body Content -->
            <div class="content-body">
                <h2 class="page-title">Dashboard</h2>

                <!-- Loading State overlay -->
                <div id="dashboard-loading" class="flex flex-col items-center justify-center py-20">
                    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-[#7A7872] text-sm">İstatistikler ve veriler yükleniyor...</p>
                </div>

                <!-- Stats and History Container -->
                <div id="dashboard-content" class="hidden">
                    <!-- Stats Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <!-- Card 1: Şu An İçeride (Vurgulu) -->
                        <div class="bg-white border-2 border-primary rounded-xl p-6 shadow-sm flex flex-col justify-between">
                            <span class="text-[11px] font-bold text-[#7A7872] uppercase tracking-wider">Şu An İçeride</span>
                            <div class="flex items-baseline gap-2 mt-4">
                                <span class="text-4xl font-extrabold text-primary" id="stat-inside">0</span>
                                <span class="text-xs font-semibold text-[#7A7872]">kişi</span>
                            </div>
                        </div>

                        <!-- Card 2: Bugün Giriş -->
                        <div class="bg-white border border-[#E0DDD5] rounded-xl p-6 shadow-sm flex flex-col justify-between">
                            <span class="text-[11px] font-bold text-[#7A7872] uppercase tracking-wider">Bugün Giriş</span>
                            <div class="flex items-baseline gap-2 mt-4">
                                <span class="text-4xl font-extrabold text-success" id="stat-entries">0</span>
                                <span class="text-xs font-semibold text-[#7A7872]">işlem</span>
                            </div>
                        </div>

                        <!-- Card 3: Bugün Çıkış -->
                        <div class="bg-white border border-[#E0DDD5] rounded-xl p-6 shadow-sm flex flex-col justify-between">
                            <span class="text-[11px] font-bold text-[#7A7872] uppercase tracking-wider">Bugün Çıkış</span>
                            <div class="flex items-baseline gap-2 mt-4">
                                <span class="text-4xl font-extrabold text-dark" id="stat-exits">0</span>
                                <span class="text-xs font-semibold text-[#7A7872]">işlem</span>
                            </div>
                        </div>

                        <!-- Card 4: Şüpheli Denemeler (7 gün) -->
                        <div class="bg-white border border-[#E0DDD5] rounded-xl p-6 shadow-sm flex flex-col justify-between" id="stat-attempts-card">
                            <span class="text-[11px] font-bold text-[#7A7872] uppercase tracking-wider">Şüpheli Deneme (7 Gün)</span>
                            <div class="flex items-baseline gap-2 mt-4">
                                <span class="text-4xl font-extrabold" id="stat-attempts">0</span>
                                <span class="text-xs font-semibold text-[#7A7872]">deneme</span>
                            </div>
                        </div>
                    </div>

                    <!-- History Table Card -->
                    <div class="bg-white border border-[#E0DDD5] rounded-xl p-6 shadow-sm">
                        <div class="flex items-center justify-between mb-5">
                            <h3 class="font-bold text-lg text-dark">Son Hareketler</h3>
                            <span class="text-xs text-[#7A7872] font-semibold">Son 10 Geçiş Kaydı</span>
                        </div>

                        <!-- Table area -->
                        <div class="admin-table-container">
                            <table class="admin-table w-full">
                                <thead>
                                    <tr>
                                        <th class="w-1/6">Saat</th>
                                        <th class="w-1/4">Personel</th>
                                        <th class="w-1/6">Tip</th>
                                        <th class="w-1/4">Lokasyon</th>
                                        <th class="w-1/6">Yöntem</th>
                                    </tr>
                                </thead>
                                <tbody id="transactions-tbody">
                                    <!-- Dynamic rows loaded here -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Empty state -->
                        <div id="transactions-empty" class="hidden text-center py-10">
                            <p class="text-[#7A7872] text-sm">Henüz hareket yok.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/api.js?v=3"></script>
    <script src="js/layout.js?v=3"></script>
    <script src="js/dashboard.js?v=3"></script>
</body>
</html>
