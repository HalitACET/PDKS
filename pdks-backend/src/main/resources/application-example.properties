# ==========================================
# PDKS BACKEND AYAR ŞABLONU
# Bu dosyanın adını "application.properties" olarak değiştirip kendi bilgilerinizi girin.
# ==========================================

# Sunucu Portu
server.port=8080

# Veritabanı Bağlantısı (SQL Server Örneği)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pdksdb;encrypt=true;trustServerCertificate=true
spring.datasource.username=KULLANICI_ADINIZI_YAZIN
spring.datasource.password=SIFRENIZI_YAZIN
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Ayarları
# Güçlü, en az 256-bit (32 karakter) Base64 kodlu bir secret key kullanın
jwt.secret=BURAYA_GIZLI_JWT_ANAHTARINIZI_YAZIN
jwt.expiration=86400000
